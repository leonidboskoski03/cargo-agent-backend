services:
  postgres:
    image: postgres:16-alpine
    container_name: cargo-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cargo_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cargo_agent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cargo_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cargo-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cargo_agent_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cargo_agent_postgres_data:
  cargo_agent_redis_data:

