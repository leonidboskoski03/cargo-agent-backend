name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cargo_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cargo_agent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      TZ: UTC
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cargo_agent_test
      JWT_ACCESS_SECRET: 1234567890123456
      JWT_REFRESH_SECRET: 12345678901234567
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: silent
      REDIS_URL: redis://127.0.0.1:6379
      BULLMQ_ENABLED: "false"
      CRON_ENABLED: "false"
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      STRIPE_PRO_MONTHLY_PRICE_ID: price_ci_placeholder
      STRIPE_CHECKOUT_SUCCESS_URL: http://localhost:3000/billing/success
      STRIPE_CHECKOUT_CANCEL_URL: http://localhost:3000/billing/cancel
      BILLING_PORTAL_RETURN_URL: http://localhost:3000/settings/billing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate and generate
        run: npm run ci:prisma

      - name: Apply DB migrations
        run: npx prisma migrate deploy --schema prisma/schema.prisma

      - name: Build
        run: npm run build

      - name: Test (unit, fail fast)
        run: npm run test:ci:unit

      - name: Test (integration, serialized and fail fast)
        run: |
          npm run test:ci:integration || {
            echo "Integration suite failed on first attempt. Retrying once to rule out transient CI flake..."
            npm run test:ci:integration
          }

