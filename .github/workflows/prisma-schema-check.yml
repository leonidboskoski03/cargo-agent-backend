name: Prisma Schema Check

on:
  pull_request:
    paths:
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/prisma-schema-check.yml"
  push:
    branches:
      - main
    paths:
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/prisma-schema-check.yml"

jobs:
  prisma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate split Prisma schema
        run: npm run ci:prisma

